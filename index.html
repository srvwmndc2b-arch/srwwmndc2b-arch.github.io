<body>
<div class="app-wrapper">

<!-- MODALS (остаются без изменений) -->
<div id="financeModal" class="modal-overlay"><div class="transaction-modal" style="background:white;border-radius:48px;width:400px;padding:32px;"><h3 id="modalTitleFinance">Пополнение</h3><input type="date" id="transactionDate" style="width:100%;padding:14px;border-radius:32px;border:1px solid #ddd;margin-bottom:16px;"><input type="number" id="transactionAmount" placeholder="Сумма" step="0.01" style="width:100%;padding:14px;border-radius:32px;border:1px solid #ddd;margin-bottom:16px;"><div class="modal-buttons" style="display:flex;gap:12px;"><button class="modal-cancel" id="cancelFinanceModal" style="flex:1;padding:14px;border-radius:40px;background:#f0f0f0;border:none;cursor:pointer;">Отмена</button><button class="modal-submit" id="submitFinanceModal" style="flex:1;padding:14px;border-radius:40px;background:#1a1a1a;color:white;border:none;cursor:pointer;">Добавить</button></div></div></div>

<!-- Модалки Summer FP -->

        <h3 id="summerDayModalTitle">Понедельник</h3>

        <button class="save-day-btn" id="saveSummerDayBtn">Сохранить</button>

<script>
    // ========== HOME (HABITS) DATA ==========
    const startDateSummer = new Date(2026, 5, 1);
    const endDateSummer = new Date(2026, 7, 31);
    const totalDays = 92;
    function getDayOfSummer() { const today = new Date(); if (today < startDateSummer) return 0; if (today > endDateSummer) return totalDays; return Math.floor((today - startDateSummer) / (1000*60*60*24)) + 1; }
    let habits = [];
    function loadHabits() { const saved = localStorage.getItem('primeHabits'); if(saved) habits = JSON.parse(saved); else habits = [ { id:0, name:'Mathematical', completedDays:[], currentStreak:0, maxStreak:0 }, { id:1, name:'Literature', completedDays:[], currentStreak:0, maxStreak:0 }, { id:2, name:'Music', completedDays:[], currentStreak:0, maxStreak:0 }, { id:3, name:'Design', completedDays:[], currentStreak:0, maxStreak:0 } ]; updateAllStreaks(); }
    function saveHabits() { localStorage.setItem('primeHabits', JSON.stringify(habits)); }
    function updateStreak(habit) { let streak = 0; for(let i=getDayOfSummer(); i>=1; i--) { if(habit.completedDays.includes(i)) streak++; else break; } habit.currentStreak = streak; if(streak > habit.maxStreak) habit.maxStreak = streak; }
    function updateAllStreaks() { habits.forEach(h => updateStreak(h)); }
    function toggleDay(habitId, dayNum) { let habit = habits.find(h => h.id === habitId); if(!habit) return; let idx = habit.completedDays.indexOf(dayNum); if(idx === -1) habit.completedDays.push(dayNum); else habit.completedDays.splice(idx,1); habit.completedDays.sort((a,b)=>a-b); updateStreak(habit); saveHabits(); renderHabitsGrid(); renderAllDonePanel(); updateCalendarStats(); }
    function addHabit() { let newId = Date.now(); habits.push({ id:newId, name:'Новая привычка', completedDays:[], currentStreak:0, maxStreak:0 }); saveHabits(); renderHabitsGrid(); renderAllDonePanel(); }
    function deleteHabit(habitId) { if(confirm('Удалить?')) { habits = habits.filter(h => h.id !== habitId); saveHabits(); renderHabitsGrid(); renderAllDonePanel(); } }
    function resetHabit(habitId) { if(confirm('Обнулить?')) { let habit = habits.find(h => h.id === habitId); if(habit) { habit.completedDays = []; habit.currentStreak = 0; saveHabits(); renderHabitsGrid(); renderAllDonePanel(); } } }
    function renameHabit(habitId, newName) { let habit = habits.find(h => h.id === habitId); if(habit && newName.trim()) { habit.name = newName.trim(); saveHabits(); renderHabitsGrid(); } }
    function getProgressPercent(habit) { return (habit.completedDays.length / totalDays) * 100; }
    function getAllHabitsDoneDays() { let allDays = []; for(let day=1; day<=totalDays; day++) { let allCompleted = habits.every(h => h.completedDays.includes(day)); if(allCompleted) allDays.push(day); } return allDays; }
    function getAllDoneCount() { return getAllHabitsDoneDays().length; }
    function renderAllDonePanel() { let container = document.getElementById('allDonePanel'); if(container) container.innerHTML = `<div class="all-done-left"><div class="all-done-label">Все привычки за день</div><div class="all-done-number">${getAllDoneCount()}</div><div class="all-done-sub">дней выполнены все привычки</div></div><div class="all-done-icon"><i class="fas fa-trophy"></i></div>`; }
    function renderHabitsGrid() { let container = document.getElementById('habitsGrid'); if(!container) return; let html = '<div class="habits-grid">'; habits.forEach(h => { html += `<div class="habit-card"><div class="habit-header"><span class="habit-name" onclick="startRename(${h.id}, '${escapeHtml(h.name)}')">${escapeHtml(h.name)}</span><div class="habit-actions"><button class="habit-btn" onclick="resetHabit(${h.id})"><i class="fas fa-undo-alt"></i></button><button class="habit-btn delete" onclick="deleteHabit(${h.id})"><i class="fas fa-trash-alt"></i></button></div></div><div class="streak"><div class="streak-number">${h.currentStreak}</div><div class="streak-label">дней подряд</div></div><div class="progress-bar-bg"><div class="progress-fill" style="width: ${getProgressPercent(h)}%;"></div></div><div class="habit-footer"><span class="days-text">${h.completedDays.length} / ${totalDays} дней</span><button class="check-btn ${h.completedDays.includes(getDayOfSummer()) ? 'completed' : ''}" onclick="toggleToday(${h.id})"><i class="fas fa-check"></i></button></div></div>`; }); html += '</div>'; container.innerHTML = html; }
    function toggleToday(habitId) { let today = getDayOfSummer(); if(today>=1 && today<=totalDays) toggleDay(habitId, today); }
    function startRename(habitId, currentName) { let newName = prompt('Новое название:', currentName); if(newName && newName.trim()) renameHabit(habitId, newName); }
    window.toggleToday = toggleToday; window.deleteHabit = deleteHabit; window.resetHabit = resetHabit; window.addHabit = addHabit; window.startRename = startRename;

    // ========== CALENDAR ==========
    let currentCalendarMonth = 5, calendarYear = 2026, monthNames = ['ИЮНЬ 2026','ИЮЛЬ 2026','АВГУСТ 2026'], weekdaysRu = ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
    let dayData = {};
    function loadDayData() { let saved = localStorage.getItem('primeDayTracker'); if(saved) dayData = JSON.parse(saved); else dayData = {}; }
    function saveDayData() { localStorage.setItem('primeDayTracker', JSON.stringify(dayData)); }
    function getDateKey(y,m,d) { return `${y}-${m}-${d}`; }
    function getDefaultDayData() { return { routine: { ALL: false, MW: false, NP: false }, focus: 0, keyTasks: [] }; }
    function getDayData(y,m,d) { let key = getDateKey(y,m,d); if(!dayData[key]) dayData[key] = getDefaultDayData(); return dayData[key]; }
    function setDayData(y,m,d,data) { dayData[getDateKey(y,m,d)] = data; saveDayData(); updateCalendarStats(); }
    function calculateScore(data) { let score = 0; if(data.routine.ALL) score++; if(data.routine.MW) score++; if(data.routine.NP) score++; score += data.focus; let completed = data.keyTasks.filter(t=>t.completed).length; score += Math.min(completed,5); return Math.min(score,10); }
    function getScoreForDay(y,m,d) { let key = getDateKey(y,m,d); if(!dayData[key]) return 0; return calculateScore(dayData[key]); }
    function getCircleProgress(score) { if(score===0) return 132; if(score<=4) return 132; if(score<=6) return 99; if(score<=8) return 33; return 0; }
    function getDaysInMonth(m,y) { return new Date(y,m+1,0).getDate(); }
    function getFirstDayIndex(m,y) { let date = new Date(y,m,1); let dow = date.getDay(); return dow===0?6:dow-1; }
    function renderCalendar(m,y) { let days = getDaysInMonth(m,y), first = getFirstDayIndex(m,y), today = new Date(), isCurrent = (today.getMonth()===m && today.getFullYear()===y), todayDate = today.getDate(), prevDays = getDaysInMonth(m-1,y); let html = '<div class="calendar-grid">'; weekdaysRu.forEach(w => html += `<div class="weekday">${w}</div>`); let dayCounter=1, nextDay=1; for(let i=0; i<42; i++) { let dayNum, isCurrentMonth, isToday=false; if(i<first) { dayNum = prevDays - (first-i) + 1; isCurrentMonth=false; } else if(dayCounter<=days) { dayNum = dayCounter; isCurrentMonth=true; isToday = (isCurrent && dayCounter===todayDate); dayCounter++; } else { dayNum = nextDay; isCurrentMonth=false; nextDay++; } let progress = 132; if(isCurrentMonth) progress = getCircleProgress(getScoreForDay(y,m,dayNum)); let todayClass = isToday ? 'today' : ''; let otherClass = !isCurrentMonth ? 'other-month' : ''; html += `<div style="display:flex;justify-content:center;"><button class="day-button ${todayClass} ${otherClass}" data-day="${dayNum}" data-month="${m}" data-year="${y}" data-current="${isCurrentMonth}"><span>${dayNum}</span><svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="21" stroke-dasharray="132" stroke-dashoffset="${progress}"></circle></svg></button></div>`; } html += '</div>'; return html; }
    function updateCalendarStats() { let strong=0, total=0, count=0; for(let key in dayData) { let score = calculateScore(dayData[key]); total += score; count++; if(score>=9) strong++; } let middle = count>0 ? (total/count).toFixed(1) : 0; let strongEl = document.getElementById('strongDaysValue'); let totalEl = document.getElementById('totalScoreValueStats'); let middleEl = document.getElementById('middleMarkValue'); if(strongEl) strongEl.innerText = strong; if(totalEl) totalEl.innerText = total; if(middleEl) middleEl.innerText = middle; }
    function updateCalendar() { let container = document.getElementById('calendarContainer'); if(container) { container.innerHTML = renderCalendar(currentCalendarMonth, calendarYear); document.getElementById('currentMonthDisplay').innerText = monthNames[currentCalendarMonth-5]; document.querySelectorAll('.day-button[data-current="true"]').forEach(btn => { btn.addEventListener('click', () => { openTaskModal(parseInt(btn.dataset.year), parseInt(btn.dataset.month), parseInt(btn.dataset.day)); }); }); } updateDaysLeft(); updateCalendarStats(); }
    function updateDaysLeft() { let diff = Math.ceil((new Date(2026,7,31) - new Date())/(1000*60*60*24)); let el = document.getElementById('daysLeftValue'); if(el) el.innerText = diff>0?diff:0; }
    function prevMonth() { if(currentCalendarMonth>5) { currentCalendarMonth--; updateCalendar(); } }
    function nextMonth() { if(currentCalendarMonth<7) { currentCalendarMonth++; updateCalendar(); } }

    let currentYear, currentMonth, currentDay, currentData = null;
    function openTaskModal(y,m,d) { currentYear=y; currentMonth=m; currentDay=d; currentData = getDayData(y,m,d); document.getElementById('modalDayNum').innerText = d; document.getElementById('taskALL').checked = currentData.routine.ALL; document.getElementById('taskMW').checked = currentData.routine.MW; document.getElementById('taskNP').checked = currentData.routine.NP; document.querySelectorAll('.focus-option').forEach(btn => { btn.classList.remove('active'); if(parseInt(btn.dataset.focus) === currentData.focus) btn.classList.add('active'); }); renderKeyTasks(); updateModalScore(); document.getElementById('taskModal').classList.add('active'); }
    function renderKeyTasks() { let list = document.getElementById('keyTasksList'); list.innerHTML = ''; currentData.keyTasks.forEach((task, idx) => { let li = document.createElement('li'); li.innerHTML = `<input type="checkbox" data-key-idx="${idx}" ${task.completed ? 'checked' : ''}><span style="flex:1; ${task.completed ? 'text-decoration:line-through;color:#999;' : ''}">${escapeHtml(task.text)}</span><button data-key-idx="${idx}" class="delete-key-task" style="background:none;border:none;color:#bbb;cursor:pointer;"><i class="fas fa-times"></i></button>`; list.appendChild(li); }); document.querySelectorAll('#keyTasksList input').forEach(cb => { cb.addEventListener('change', (e) => { let idx = parseInt(cb.dataset.keyIdx); currentData.keyTasks[idx].completed = cb.checked; setDayData(currentYear,currentMonth,currentDay,currentData); updateModalScore(); updateCalendar(); }); }); document.querySelectorAll('.delete-key-task').forEach(btn => { btn.addEventListener('click', (e) => { let idx = parseInt(btn.dataset.keyIdx); currentData.keyTasks.splice(idx,1); setDayData(currentYear,currentMonth,currentDay,currentData); renderKeyTasks(); updateModalScore(); updateCalendar(); }); }); }
    function updateModalScore() { let score = calculateScore(currentData); document.getElementById('totalScoreValue').innerText = `${score}/10`; let msg = score <= 3 ? "слабый день" : (score <= 6 ? "средний день" : (score <= 8 ? "хороший день" : "отличный день!")); document.getElementById('scoreMessage').innerHTML = msg; }
    function saveCurrentData() { currentData.routine = { ALL: document.getElementById('taskALL').checked, MW: document.getElementById('taskMW').checked, NP: document.getElementById('taskNP').checked }; let active = document.querySelector('.focus-option.active'); currentData.focus = active ? parseInt(active.dataset.focus) : 0; setDayData(currentYear,currentMonth,currentDay,currentData); updateModalScore(); updateCalendar(); }

    // ========== FINANCE ==========
    let balance = 0, transactions = [], allocations = [];
    function loadFinanceData() { let b = localStorage.getItem('primeBalance'); if(b) balance = parseFloat(b); else balance = 0; let t = localStorage.getItem('primeTransactions'); if(t) transactions = JSON.parse(t); else transactions = []; let a = localStorage.getItem('primeAllocations'); if(a) allocations = JSON.parse(a); else allocations = []; }
    function saveFinanceData() { localStorage.setItem('primeBalance', balance); localStorage.setItem('primeTransactions', JSON.stringify(transactions)); localStorage.setItem('primeAllocations', JSON.stringify(allocations)); }
    function formatDate(d) { return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short'}); }
    function updateBalanceDisplay() { let el = document.getElementById('balanceAmount'); if(el) el.innerText = balance.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
    function renderTransactions() {
        let container = document.getElementById('transactionsList');
        if (!container) return;
        container.innerHTML = '';
        if (transactions.length === 0) {
            container.innerHTML = '<div class="empty-transactions">Нет транзакций</div>';
            return;
        }
        [...transactions].reverse().forEach(t => {
            let div = document.createElement('div');
            div.className = 'transaction-item';
            let isIncome = t.type === 'income';
            div.innerHTML = `<div class="transaction-left"><div class="transaction-icon"><i class="fas ${isIncome ? 'fa-arrow-down' : 'fa-arrow-up'}"></i></div><div class="transaction-info"><div class="name">${escapeHtml(t.name)}</div><div class="date">${formatDate(t.date)}</div></div></div><div class="transaction-amount ${isIncome ? 'income' : 'expense'}">${isIncome ? '+' : '-'} $${t.amount.toLocaleString('en-US',{minimumFractionDigits:2})}</div>`;
            container.appendChild(div);
        });
        // добавляем кнопку очистки, если есть транзакции
        const clearBtn = document.createElement('button');
        clearBtn.className = 'clear-history-btn';
        clearBtn.innerHTML = '<i class="fas fa-trash-alt"></i> Очистить всю историю';
        clearBtn.onclick = () => {
            if (confirm('Вы уверены? Все транзакции будут удалены без возможности восстановления. Баланс останется прежним.')) {
                transactions = [];
                saveFinanceData();
                renderTransactions();
                drawChart();
            }
        };
        container.appendChild(clearBtn);
    }

            for (let d = 0; d < 7; d++) {

                    fullName: fullNames[d],
                    score: 0,
                    metrics: { weight: '', knee: '', periosteum: '', sleep: '', football: '', generalFeeling: '' },
                    endMetrics: { weight: '', knee: '', periosteum: '', sleep: '', football: '', generalFeeling: '' },

                <div class="rehab-field"><label>Надкостницы (1–10) — итог</label><input type="number" min="1" max="10" id="summer_periosteum_end" value="${day.endMetrics.periosteum}"></div>
                <div class="rehab-field"><label>Сон (1–10) — итог</label><input type="number" min="1" max="10" id="summer_sleep_end" value="${day.endMetrics.sleep}"></div>
                <div class="rehab-field"><label>Футбол (1–10) — итог</label><input type="number" min="1" max="10" id="summer_football_end" value="${day.endMetrics.football}"></div>
                <div class="rehab-field"><label>Общее состояние — итог</label><textarea id="summer_general_end" rows="2">${escapeHtml(day.endMetrics.generalFeeling)}</textarea></div>
            `;
        }

        let dayGoalsHtml = `
            <div class="day-goals-section">
                <div class="day-goals-title">Задачи на день</div>
                <ul class="day-goals-list" id="summerDayGoalsList">
        `;
        day.dayGoals.forEach((goal, gIdx) => {
            dayGoalsHtml += `
                <li>
                    <input type="checkbox" ${goal.completed ? 'checked' : ''} onchange="toggleSummerDayGoal(${weekIdx}, ${dayIdx}, ${gIdx})">
                    <span>${escapeHtml(goal.text)}</span>
                    <button onclick="deleteSummerDayGoal(${weekIdx}, ${dayIdx}, ${gIdx})"><i class="fas fa-times"></i></button>
                </li>
            `;
        });
        dayGoalsHtml += `
                </ul>
                <input type="text" id="newSummerDayGoalInput" class="add-goal-input" placeholder="Новая задача + Enter">
            </div>
        `;

        document.getElementById('summerDayModalTitle').innerHTML = `${day.fullName} (Неделя ${week.id})`;
        document.getElementById('summerDayModalContent').innerHTML = (metricsHtml ? metricsHtml : '<p style="color:#888; margin-bottom:16px;">В этот день нет обязательных метрик. Вы можете добавить задачи ниже.</p>') + dayGoalsHtml;

        const dayInput = document.getElementById('newSummerDayGoalInput');
        if (dayInput) {
            dayInput.removeEventListener('keypress', dayInput._listener);
            dayInput._listener = (e) => {
                if (e.key === 'Enter') {
                    const text = e.target.value.trim();
                    if (text) {
                        summerWeeksData[weekIdx].days[dayIdx].dayGoals.push({ text: text, completed: false });
                        saveSummerData();
                        openSummerDayModal(weekIdx, dayIdx);
                    }
                }
            };
            dayInput.addEventListener('keypress', dayInput._listener);
        }
        document.getElementById('summerDayModal').classList.add('active');
    }

    window.toggleSummerDayGoal = (weekIdx, dayIdx, goalIdx) => {
        summerWeeksData[weekIdx].days[dayIdx].dayGoals[goalIdx].completed = !summerWeeksData[weekIdx].days[dayIdx].dayGoals[goalIdx].completed;
        saveSummerData();
        openSummerDayModal(weekIdx, dayIdx);
    };
    window.deleteSummerDayGoal = (weekIdx, dayIdx, goalIdx) => {
        summerWeeksData[weekIdx].days[dayIdx].dayGoals.splice(goalIdx, 1);
        saveSummerData();
        openSummerDayModal(weekIdx, dayIdx);
    };

    function saveSummerCurrentDay() {
        const week = summerWeeksData[currentSummerDayWeekIdx];
        const day = week.days[currentSummerDayIdx];
        const isMonday = (currentSummerDayIdx === 0);
        const isSunday = (currentSummerDayIdx === 6);

        if (isMonday) {
            day.metrics.weight = document.getElementById('summer_weight')?.value || '';
            day.metrics.knee = document.getElementById('summer_knee')?.value || '';
            day.metrics.periosteum = document.getElementById('summer_periosteum')?.value || '';
            day.metrics.sleep = document.getElementById('summer_sleep')?.value || '';
            day.metrics.football = document.getElementById('summer_football')?.value || '';
            day.metrics.generalFeeling = document.getElementById('summer_general')?.value || '';
        } else if (isSunday) {
            day.endMetrics.weight = document.getElementById('summer_weight_end')?.value || '';
            day.endMetrics.knee = document.getElementById('summer_knee_end')?.value || '';
            day.endMetrics.periosteum = document.getElementById('summer_periosteum_end')?.value || '';
            day.endMetrics.sleep = document.getElementById('summer_sleep_end')?.value || '';
            day.endMetrics.football = document.getElementById('summer_football_end')?.value || '';
            day.endMetrics.generalFeeling = document.getElementById('summer_general_end')?.value || '';
        } else {
            let customScore = prompt('Оцените день от 1 до 10 (необязательно):', day.score || '');
            if (customScore !== null) {
                let sc = parseInt(customScore);
                if (!isNaN(sc) && sc >= 1 && sc <= 10) day.score = sc;
                else if (customScore === '') {}
                else alert('Введите число от 1 до 10');
            }
        }

        if (isMonday || isSunday) {
            let total = 0, cnt = 0;
            const metrics = isMonday ? day.metrics : day.endMetrics;
            const vals = [metrics.knee, metrics.periosteum, metrics.sleep, metrics.football];
            vals.forEach(v => {
                let num = parseFloat(v);
                if (!isNaN(num) && num >= 1 && num <= 10) { total += num; cnt++; }
            });
            if (cnt > 0) day.score = Math.round(total / cnt);
        }

        saveSummerData();
        recalcSummerWeekAvg(currentSummerDayWeekIdx);
        document.getElementById('summerDayModal').classList.remove('active');
        openSummerWeekModal(currentSummerDayWeekIdx);
        renderSummerWeeksGrid();
    }

    // ========== КОНТЕНТ ==========
    const homeMainContent = `<div class="education-card"><h2>Consistency</h2><p>is what makes work effective.</p></div><div class="habits-header-row"><button class="add-habit-btn" onclick="addHabit()"><i class="fas fa-plus-circle"></i> Добавить привычку</button></div><div id="habitsGrid"></div><div id="allDonePanel" class="all-done-panel"></div>`;
    const homeRightContent = `<div class="calendar-card"><div class="calendar-header"><h4>Calendar</h4><div class="month-nav"><button id="prevMonthBtn">←</button><span id="currentMonthDisplay" style="font-weight:600;">ИЮНЬ 2026</span><button id="nextMonthBtn">→</button></div></div><div id="calendarContainer"></div><div class="stats-row"><div class="stat-line"><span>Strong days (9-10 баллов)</span><span id="strongDaysValue">0</span></div><div class="stat-line"><span>Total score</span><span id="totalScoreValueStats">0</span></div><div class="stat-line"><span>Middle mark</span><span id="middleMarkValue">0</span></div></div><div class="days-left"><i class="fas fa-calendar-alt"></i> До конца лета: <strong id="daysLeftValue">0</strong> дней <i class="fas fa-sun"></i></div></div>`;
    const financeMainContent = `<div class="finance-card"><div class="finance-title">Общий бюджет</div><div class="balance-amount">$<span id="balanceAmount">0</span></div><div class="action-buttons"><button class="action-circle" id="incomeBtn">+</button><button class="action-circle" id="expenseBtn">−</button></div></div><div class="transactions-card"><h3>История транзакций</h3><div id="transactionsList"></div></div>`;
    const financeRightContent = `<div class="chart-card"><h4>Динамика баланса (90 дней)</h4><div class="chart-container" id="chartContainer"></div></div><div class="allocation-card"><h4>Распределение бюджета</h4><div id="allocationsList"></div><button class="add-allocation-btn" id="addAllocationBtn"><i class="fas fa-plus-circle"></i> Добавить статью</button></div>`;
    const goalsMainContent = `<div class="education-card"><h2>Goal summer</h2><p>Твои цели на лето 2026</p></div><div class="goals-card"><div class="goals-header"><h3>Мои цели</h3><button class="add-goal-btn" onclick="openGoalModal()"><i class="fas fa-plus-circle"></i> Добавить цель</button></div><div id="goalsList" class="goals-list"></div></div>`;
    const notesMainContent = `<div class="education-card"><h2>Notes</h2><p>Your personal notes</p></div><div class="notes-card"><div class="notes-header"><h3>Все заметки</h3><button class="add-note-btn" onclick="openNoteModal()"><i class="fas fa-plus-circle"></i> Новая заметка</button></div><div id="notesList" class="notes-list"></div></div>`;
    const summerMainContent = `<div class="education-card"><h2>Summer FP 2026</h2><p>Реабилитация колена · 12 недель к восстановлению</p></div><div id="summerWeeksContainer" class="weeks-grid"></div>`;

    function setActiveSection(sectionId) {
        activeCustomSection = null;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.custom-nav-item').forEach(el => el.classList.remove('active-custom'));
        let navEl = document.querySelector(`.nav-item[data-section="${sectionId}"]`);
        if (navEl) navEl.classList.add('active');
        let mainEl = document.getElementById('mainContent'), rightEl = document.getElementById('rightPanel');
        if (sectionId === 'home') {
            mainEl.innerHTML = homeMainContent; rightEl.innerHTML = homeRightContent;
            renderHabitsGrid(); renderAllDonePanel(); updateCalendar();
            document.getElementById('prevMonthBtn')?.addEventListener('click', prevMonth);
            document.getElementById('nextMonthBtn')?.addEventListener('click', nextMonth);
        } else if (sectionId === 'summer') {
            mainEl.innerHTML = summerMainContent; rightEl.innerHTML = '';
            renderSummerWeeksGrid();
        } else if (sectionId === 'finance') {
            mainEl.innerHTML = financeMainContent; rightEl.innerHTML = financeRightContent;
            updateBalanceDisplay(); renderTransactions(); drawChart(); renderAllocations();
            document.getElementById('incomeBtn')?.addEventListener('click', () => openTransactionModal('income'));
            document.getElementById('expenseBtn')?.addEventListener('click', () => openTransactionModal('expense'));
            document.getElementById('addAllocationBtn')?.addEventListener('click', openAllocationModal);
            window.addEventListener('resize', () => drawChart());
        } else if (sectionId === 'goals') {
            mainEl.innerHTML = goalsMainContent; rightEl.innerHTML = '';
            renderGoals();
        } else if (sectionId === 'notes') {
            mainEl.innerHTML = notesMainContent; rightEl.innerHTML = '';
            renderNotes();
        }
    }

    document.getElementById('newChatBtn')?.addEventListener('click', addNewSection);
    document.querySelectorAll('.nav-item').forEach(btn => { btn.addEventListener('click', () => setActiveSection(btn.dataset.section)); });
    document.getElementById('cancelFinanceModal')?.addEventListener('click', () => document.getElementById('financeModal').classList.remove('active'));
    document.getElementById('submitFinanceModal')?.addEventListener('click', addTransaction);
    document.getElementById('financeModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('financeModal')) document.getElementById('financeModal').classList.remove('active'); });
    document.getElementById('cancelAllocationModal')?.addEventListener('click', () => document.getElementById('allocationModal').classList.remove('active'));
    document.getElementById('submitAllocationModal')?.addEventListener('click', addAllocationFromModal);
    document.getElementById('allocationModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('allocationModal')) document.getElementById('allocationModal').classList.remove('active'); });
    document.getElementById('cancelNoteModal')?.addEventListener('click', () => document.getElementById('noteModal').classList.remove('active'));
    document.getElementById('submitNoteModal')?.addEventListener('click', saveNote);
    document.getElementById('noteModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('noteModal')) document.getElementById('noteModal').classList.remove('active'); });
    document.getElementById('cancelGoalModal')?.addEventListener('click', () => document.getElementById('goalModal').classList.remove('active'));
    document.getElementById('submitGoalModal')?.addEventListener('click', saveGoalFromModal);
    document.getElementById('goalModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('goalModal')) document.getElementById('goalModal').classList.remove('active'); });

    // КАРТОЧКА ДНЯ
    const taskModalHtml = `<div id="taskModal" class="modal-overlay"><div class="day-card"><div class="day-card-header"><div class="day-card-title">Day <span id="modalDayNum"></span></div></div><div class="day-card-body"><div class="day-card-section"><div class="day-card-label">Routine</div><div class="day-card-check-group"><label class="day-card-check"><input type="checkbox" id="taskALL"> ALL</label><label class="day-card-check"><input type="checkbox" id="taskMW"> MW</label><label class="day-card-check"><input type="checkbox" id="taskNP"> NP</label></div></div><div class="day-card-section"><div class="day-card-label">Фокус</div><div class="day-card-focus"><button class="focus-option" data-focus="0">0</button><button class="focus-option" data-focus="1">1</button><button class="focus-option" data-focus="2">2</button></div></div><div class="day-card-section"><div class="day-card-label">Ключевые задачи (1 задача = 1 балл, макс 5)</div><input type="text" id="keyTaskInput" class="day-card-input" placeholder="Напиши задачу и нажми Enter..."><ul id="keyTasksList" class="day-card-task-list"></ul></div><div class="day-card-total">Итог: <span id="totalScoreValue">0</span> / 10 баллов<div class="day-card-total-note" id="scoreMessage"></div></div><button class="day-card-close" id="closeModalBtn">Закрыть</button><button class="day-card-delete" id="deleteDayBtn">Очистить все задачи этого дня</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', taskModalHtml);
    document.getElementById('taskALL')?.addEventListener('change', saveCurrentData);
    document.getElementById('taskMW')?.addEventListener('change', saveCurrentData);
    document.getElementById('taskNP')?.addEventListener('change', saveCurrentData);
    document.querySelectorAll('.focus-option').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.focus-option').forEach(b => { b.classList.remove('active'); b.style.background = '#f0f0f0'; b.style.color = '#333'; }); btn.classList.add('active'); btn.style.background = '#1a1a1a'; btn.style.color = 'white'; saveCurrentData(); }); });
    document.getElementById('keyTaskInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter' && currentData) { let text = e.target.value.trim(); if (text) { if (!currentData.keyTasks) currentData.keyTasks = []; currentData.keyTasks.push({ text: text, completed: false }); setDayData(currentYear, currentMonth, currentDay, currentData); renderKeyTasks(); updateModalScore(); updateCalendar(); e.target.value = ''; } } });
    document.getElementById('closeModalBtn')?.addEventListener('click', () => { document.getElementById('taskModal').classList.remove('active'); });
    document.getElementById('deleteDayBtn')?.addEventListener('click', () => { if (confirm('Очистить все задачи на этот день?')) { dayData[getDateKey(currentYear, currentMonth, currentDay)] = getDefaultDayData(); currentData = getDayData(currentYear, currentMonth, currentDay); saveDayData(); document.getElementById('taskALL').checked = false; document.getElementById('taskMW').checked = false; document.getElementById('taskNP').checked = false; document.querySelectorAll('.focus-option').forEach(b => { b.classList.remove('active'); b.style.background = '#f0f0f0'; b.style.color = '#333'; }); currentData.focus = 0; currentData.keyTasks = []; renderKeyTasks(); updateModalScore(); updateCalendar(); } });
    document.getElementById('taskModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('taskModal')) document.getElementById('taskModal').classList.remove('active'); });

    const customNoteModalHtml = `<div id="customNoteModal" class="modal-overlay"><div class="transaction-modal" style="background:white;border-radius:48px;width:400px;padding:32px;"><h3 id="customNoteModalTitle">Новая заметка</h3><textarea id="customNoteText" placeholder="Текст заметки..." style="width:100%;padding:14px;border-radius:32px;border:1px solid #ddd;margin-bottom:16px;font-family:inherit;"></textarea><div class="modal-buttons" style="display:flex;gap:12px;"><button class="modal-cancel" id="cancelCustomNoteModal" style="flex:1;padding:14px;border-radius:40px;background:#f0f0f0;border:none;cursor:pointer;">Отмена</button><button class="modal-submit" id="submitCustomNoteModal" style="flex:1;padding:14px;border-radius:40px;background:#1a1a1a;color:white;border:none;cursor:pointer;">Сохранить</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', customNoteModalHtml);
    document.getElementById('cancelCustomNoteModal')?.addEventListener('click', () => document.getElementById('customNoteModal').classList.remove('active'));
    document.getElementById('submitCustomNoteModal')?.addEventListener('click', saveCustomNote);
    document.getElementById('customNoteModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('customNoteModal')) document.getElementById('customNoteModal').classList.remove('active'); });

    // Обработчики Summer модалок
    document.getElementById('saveSummerDayBtn')?.addEventListener('click', saveSummerCurrentDay);
    document.getElementById('closeSummerWeekModalBtn')?.addEventListener('click', () => {
        document.getElementById('summerWeekModal').classList.remove('active');
        renderSummerWeeksGrid();
    });
    document.getElementById('summerWeekModal')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('summerWeekModal')) {
            document.getElementById('summerWeekModal').classList.remove('active');
            renderSummerWeeksGrid();
        }
    });
    document.getElementById('summerDayModal')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('summerDayModal')) {
            document.getElementById('summerDayModal').classList.remove('active');
        }
    });

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    loadHabits(); loadDayData(); loadFinanceData(); loadNotes(); loadGoals(); loadCustomSections(); initSummerData(); setActiveSection('home');
</script>
</body>
</html>
