
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>prime — dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== CSS ПЕРЕМЕННЫЕ ========== */
        :root {
            /* Цвета */
            --bg-page: #f5f5f5;
            --bg-white: #ffffff;
            --bg-dark: #1a1a1a;
            --bg-gray-light: #f9f9f9;
            --bg-gray: #f0f0f0;
            --border-light: #ececec;
            --border: #e0e0e0;
            --text-primary: #111111;
            --text-secondary: #333333;
            --text-muted: #666666;
            --text-light: #888888;
            --danger: #c62828;
            --danger-bg: #fff2f0;
            --success: #2e7d32;
            /* Радиусы */
            --radius-xs: 12px;
            --radius-sm: 20px;
            --radius-md: 28px;
            --radius-lg: 32px;
            --radius-xl: 40px;
            --radius-2xl: 48px;
            /* Отступы */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-2xl: 24px;
            --spacing-3xl: 28px;
            --spacing-4xl: 32px;
            /* Тени */
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.03);
            --shadow-md: 0 2px 12px rgba(0,0,0,0.04);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.04);
            --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.25);
            /* Шрифты */
            --font-family: 'Outfit', 'Inter', sans-serif;
            /* Анимации */
            --transition: all 0.25s ease;
            --transition-fast: all 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-page);
            font-family: var(--font-family);
            color: var(--text-primary);
            padding: var(--spacing-4xl) 36px;
        }

        /* ========== КОНТЕЙНЕРЫ ========== */
        .app-wrapper {
            display: flex;
            gap: var(--spacing-2xl);
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ========== САЙДБАР ========== */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: var(--spacing-4xl) var(--spacing-xl);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            height: fit-content;
            max-height: 95vh;
            overflow-y: auto;
        }

        .prime-logo {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 40px;
            padding-left: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .prime-logo i { font-size: 28px; transition: transform 0.25s; cursor: default; }
        .prime-logo i:hover { transform: scale(1.08); }

        /* ========== НАВИГАЦИЯ ========== */
        nav { display: flex; flex-direction: column; gap: var(--spacing-xs); }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 500;
            color: #4a4a4a;
            transition: var(--transition);
            cursor: pointer;
        }
        .nav-item i { width: 24px; font-size: 1.2rem; color: #5a5a5a; transition: transform 0.2s; }
        .nav-item:hover { background: #e8e8e8; transform: translateX(6px); }
        .nav-item:hover i { transform: scale(1.15); color: var(--text-primary); }
        .nav-item.active { background: #e0e0e0; color: var(--text-primary); }
        .nav-item.active i { color: var(--text-primary); }

        .new-chat-btn {
            margin-top: var(--spacing-3xl);
            margin-bottom: var(--spacing-lg);
            background: var(--bg-dark);
            border: none;
            padding: var(--spacing-md) 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition-fast);
            width: 100%;
        }
        .new-chat-btn:hover { background: #333; transform: scale(1.02); }

        /* ========== КАСТОМНЫЕ РАЗДЕЛЫ ========== */
        .dynamic-sections { margin-top: var(--spacing-md); }
        .section-divider { height: 1px; background: #ccc; margin: 14px 0 var(--spacing-lg); }
        .custom-nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px var(--spacing-md);
            margin: 6px 0;
            border-radius: var(--radius-sm);
            background: #f7f7f7;
            transition: var(--transition-fast);
            cursor: pointer;
        }
        .custom-nav-item:hover { background: #e8e8e8; transform: translateX(4px); }
        .custom-nav-item.active-custom { background: #e0e0e0; color: var(--text-primary); }
        .custom-nav-item .left { display: flex; align-items: center; gap: var(--spacing-md); font-size: 14px; font-weight: 500; flex: 1; }
        .custom-nav-item .left i { font-size: 14px; }
        .custom-nav-item .left .section-name {
            cursor: pointer;
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-xs);
            transition: background 0.2s;
        }
        .custom-nav-item .left .section-name:hover { background: #e0e0e0; }
        .delete-custom {
            background: none;
            border: none;
            font-size: 14px;
            color: #888;
            cursor: pointer;
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-sm);
        }
        .delete-custom:hover { color: var(--danger); background: #f0f0f0; }

        /* ========== ОСНОВНОЙ КОНТЕНТ ========== */
        .main-content { flex: 1; display: flex; flex-direction: column; gap: var(--spacing-2xl); }
        .right-panel { width: 380px; flex-shrink: 0; display: flex; flex-direction: column; gap: var(--spacing-2xl); }

        /* ========== УНИВЕРСАЛЬНЫЕ КАРТОЧКИ ========== */
        .card {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: 22px 24px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .card:hover { transform: translateY(-4px); }

        .education-card {
            background: var(--bg-dark);
            border-radius: var(--radius-lg);
            padding: var(--spacing-4xl) var(--spacing-3xl);
            color: white;
        }
        .education-card h2 { font-size: 28px; font-weight: 600; margin-bottom: var(--spacing-sm); letter-spacing: -0.5px; }
        .education-card p { font-size: 15px; opacity: 0.7; }

        /* Привычки */
        .habits-header-row { display: flex; justify-content: flex-end; margin-bottom: var(--spacing-xl); }
        .add-habit-btn {
            background: var(--bg-white);
            border: 2px dashed #ccc;
            border-radius: 40px;
            padding: 10px 24px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #888;
            cursor: pointer;
        }
        .add-habit-btn:hover { border-color: var(--bg-dark); color: var(--bg-dark); background: #fafafa; }

        .habits-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--spacing-xl); }
        .habit-card { background: var(--bg-white); border-radius: var(--radius-md); padding: 22px 24px; transition: transform 0.2s; box-shadow: var(--shadow-sm); }
        .habit-card:hover { transform: translateY(-4px); }
        .habit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg); }
        .habit-name { font-size: 20px; font-weight: 600; cursor: pointer; padding: var(--spacing-xs) var(--spacing-sm); border-radius: var(--radius-xs); background: none; border: none; font-family: inherit; }
        .habit-name:hover { background: #f0f0f0; }
        .habit-actions { display: flex; gap: var(--spacing-sm); }
        .habit-btn { background: none; border: none; font-size: 14px; cursor: pointer; color: #888; padding: 6px; border-radius: 30px; }
        .habit-btn:hover { background: #f0f0f0; color: #333; }
        .habit-btn.delete:hover { color: var(--danger); }
        .streak { text-align: center; margin: var(--spacing-lg) 0; }
        .streak-number { font-size: 36px; font-weight: 700; color: var(--bg-dark); }
        .streak-label { font-size: 12px; color: #888; margin-top: var(--spacing-xs); }
        .progress-bar-bg { background: #e0e0e0; height: 8px; border-radius: 10px; margin: var(--spacing-lg) 0 var(--spacing-md); overflow: hidden; }
        .progress-fill { background: var(--bg-dark); height: 8px; border-radius: 10px; width: 0%; transition: width 0.3s; }
        .habit-footer { display: flex; justify-content: space-between; align-items: center; margin-top: var(--spacing-md); }
        .days-text { font-size: 12px; color: #888; }
        .check-btn {
            background: #f0f0f0;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .check-btn.completed { background: var(--bg-dark); color: white; }
        .check-btn:hover { transform: scale(1.05); background: #e0e0e0; }

        .all-done-panel {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: var(--spacing-2xl) var(--spacing-3xl);
            margin-top: var(--spacing-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .all-done-left { display: flex; flex-direction: column; gap: var(--spacing-xs); }
        .all-done-label { font-size: 16px; font-weight: 500; color: #555; }
        .all-done-number { font-size: 48px; font-weight: 700; color: var(--bg-dark); line-height: 1; }
        .all-done-sub { font-size: 13px; color: #888; }
        .all-done-icon { font-size: 48px; color: var(--bg-dark); opacity: 0.3; }

        /* Календарь */
        .calendar-card { background: var(--bg-white); border-radius: var(--radius-lg); padding: var(--spacing-2xl); }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-xl); }
        .calendar-header h4 { font-size: 20px; font-weight: 600; }
        .month-nav { display: flex; gap: var(--spacing-lg); }
        .month-nav button { background: none; border: none; font-size: 16px; cursor: pointer; padding: var(--spacing-xs) var(--spacing-md); border-radius: 30px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; margin: var(--spacing-lg) 0; }
        .weekday { font-size: 12px; font-weight: 600; color: #555; padding: 6px 0; }
        .day-button {
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 44px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 50%;
            background: transparent;
            border: none;
            font-family: inherit;
            position: relative;
        }
        .day-button.today { background: var(--bg-dark); color: white; }
        .day-button.other-month { color: #bbb; }
        .day-button svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transform: rotate(-90deg); }
        .day-button svg circle { fill: none; stroke: var(--bg-dark); stroke-width: 3; stroke-dasharray: 132; transition: stroke-dashoffset 0.3s; }
        .stats-row { margin-top: var(--spacing-md); padding-top: var(--spacing-sm); border-top: 1px solid var(--border-light); }
        .stat-line { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; }
        .days-left { text-align: center; font-size: 14px; margin-top: var(--spacing-md); padding-top: var(--spacing-md); border-top: 1px solid var(--border-light); display: flex; align-items: center; justify-content: center; gap: var(--spacing-sm); }

        /* Финансы */
        .finance-card { background: var(--bg-dark); border-radius: var(--radius-lg); padding: var(--spacing-3xl); color: white; }
        .finance-title { font-size: 14px; opacity: 0.6; margin-bottom: var(--spacing-xl); }
        .balance-amount { font-size: 48px; font-weight: 700; letter-spacing: -1px; margin-bottom: var(--spacing-2xl); }
        .action-buttons { display: flex; gap: var(--spacing-xl); }
        .action-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: none;
            color: white;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-circle:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }

        .transactions-card { background: var(--bg-white); border-radius: var(--radius-lg); padding: var(--spacing-2xl); }
        .transactions-card h3 { font-size: 18px; font-weight: 600; margin-bottom: var(--spacing-xl); }
        .empty-transactions { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }
        .transaction-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
        .transaction-left { display: flex; align-items: center; gap: 14px; }
        .transaction-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #f0f0f0; color: #333; }
        .transaction-info .name { font-weight: 600; font-size: 15px; }
        .transaction-info .date { font-size: 12px; color: #888; margin-top: 2px; }
        .transaction-amount.income { color: var(--success); }
        .transaction-amount.expense { color: var(--danger); }

        .clear-history-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: var(--danger);
            cursor: pointer;
            margin-top: var(--spacing-xl);
            width: 100%;
        }
        .clear-history-btn:hover { background: var(--danger-bg); border-color: var(--danger); }

        .chart-card, .allocation-card { background: var(--bg-white); border-radius: var(--radius-lg); padding: var(--spacing-2xl); }
        .chart-card h4, .allocation-card h4 { font-size: 18px; font-weight: 600; margin-bottom: var(--spacing-xl); }
        .chart-container { height: 180px; width: 100%; }
        .allocation-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .allocation-name { font-weight: 500; cursor: pointer; padding: var(--spacing-xs) var(--spacing-sm); border-radius: var(--radius-xs); }
        .allocation-name:hover { background: #f0f0f0; }
        .allocation-amount { font-weight: 600; }
        .allocation-actions { display: flex; gap: var(--spacing-sm); }
        .allocation-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 12px; padding: var(--spacing-xs); }
        .add-allocation-btn {
            margin-top: var(--spacing-lg);
            padding: var(--spacing-md);
            width: 100%;
            background: #f5f5f5;
            border: 1px dashed #ccc;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
        }
        .add-allocation-btn:hover { border-color: var(--bg-dark); color: var(--bg-dark); }

        /* Заметки и цели */
        .notes-card, .goals-card { background: var(--bg-white); border-radius: var(--radius-lg); padding: var(--spacing-2xl); }
        .notes-header, .goals-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-2xl); }
        .notes-header h3, .goals-header h3 { font-size: 20px; font-weight: 600; }
        .add-note-btn, .add-goal-btn {
            background: var(--bg-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        .add-note-btn:hover, .add-goal-btn:hover { background: #333; }
        .notes-list, .goals-list { display: flex; flex-direction: column; gap: var(--spacing-md); }
        .note-item, .goal-item { background: #f9f9f9; border-radius: var(--radius-sm); padding: 16px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .note-item:hover, .goal-item:hover { background: #f0f0f0; }
        .note-content { flex: 1; cursor: pointer; }
        .note-text { font-size: 15px; line-height: 1.4; color: #333; }
        .note-date { font-size: 11px; color: #aaa; margin-top: var(--spacing-sm); }
        .note-actions { display: flex; gap: var(--spacing-sm); }
        .note-btn { background: none; border: none; color: #999; cursor: pointer; padding: 6px; border-radius: var(--radius-sm); }
        .note-btn:hover { background: #e0e0e0; color: #333; }
        .note-btn.delete:hover { color: var(--danger); }
        .empty-notes, .empty-goals { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
        .goal-left { display: flex; align-items: center; gap: 14px; flex: 1; cursor: pointer; }
        .goal-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #aaa; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .goal-check.completed { background: var(--bg-dark); border-color: var(--bg-dark); color: white; }
        .goal-text { font-size: 15px; color: #333; flex: 1; }
        .goal-text.completed { text-decoration: line-through; color: #999; }
        .goal-date { font-size: 11px; color: #aaa; margin-left: var(--spacing-md); }
        .goal-delete { background: none; border: none; color: #999; cursor: pointer; padding: 6px; border-radius: var(--radius-sm); }

        /* SUMMER FP 2026 */
        .weeks-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--spacing-xl); }
        .week-card { background: var(--bg-white); border-radius: var(--radius-md); padding: 22px 24px; transition: transform 0.2s; box-shadow: var(--shadow-sm); cursor: pointer; }
        .week-card:hover { transform: translateY(-4px); }
        .week-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md); }
        .week-number { font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .week-avg-score { background: #f0f0f0; padding: 4px 12px; border-radius: 30px; font-size: 13px; font-weight: 600; color: #222; }
        .week-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--spacing-lg); padding-bottom: var(--spacing-md); border-bottom: 1px solid var(--border-light); }
        .week-title { font-size: 15px; font-weight: 500; color: #333; flex: 1; }
        .edit-title-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 13px; padding: var(--spacing-xs) var(--spacing-sm); border-radius: var(--radius-sm); }
        .week-stats { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-top: var(--spacing-md); padding-top: var(--spacing-md); border-top: 1px solid var(--border-light); }
        .week-modal { background: var(--bg-white); border-radius: var(--radius-lg); width: 90%; max-width: 1100px; max-height: 85vh; overflow-y: auto; padding: var(--spacing-3xl) var(--spacing-4xl); }
        .week-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-2xl); padding-bottom: var(--spacing-lg); border-bottom: 1px solid var(--border-light); }
        .week-modal-header h2 { font-size: 24px; font-weight: 600; }
        .close-modal { background: none; border: none; font-size: 28px; cursor: pointer; color: #aaa; }
        .close-modal:hover { color: #333; }
        .weekly-goals-section { background: #f9f9f9; border-radius: var(--radius-md); padding: var(--spacing-xl) var(--spacing-2xl); margin-bottom: var(--spacing-3xl); }
        .weekly-goals-title { font-weight: 600; font-size: 17px; margin-bottom: var(--spacing-lg); color: #222; }
        .weekly-goals-list { list-style: none; margin-bottom: var(--spacing-lg); }
        .weekly-goals-list li { display: flex; align-items: center; gap: var(--spacing-md); padding: 10px 0; border-bottom: 1px solid var(--border-light); }
        .weekly-goals-list li input { width: 20px; height: 20px; appearance: none; border-radius: 50%; border: 2px solid #aaa; background: white; cursor: pointer; }
        .weekly-goals-list li input:checked { background: var(--bg-dark); border-color: var(--bg-dark); box-shadow: inset 0 0 0 3px white; }
        .weekly-goals-list li span { flex: 1; font-size: 14px; }
        .weekly-goals-list li button { background: none; border: none; color: #bbb; cursor: pointer; }
        .add-goal-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-lg); font-family: inherit; font-size: 14px; background: #fafafa; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: var(--spacing-md); margin: var(--spacing-2xl) 0; }
        .day-card-summer { background: #fafafa; border-radius: var(--radius-sm); padding: 14px 12px; cursor: pointer; transition: var(--transition-fast); border: 1px solid var(--border-light); text-align: center; }
        .day-card-summer:hover { background: #f0f0f0; transform: translateY(-2px); }
        .day-name { font-weight: 600; font-size: 13px; color: #555; margin-bottom: var(--spacing-sm); }
        .day-score { font-size: 20px; font-weight: 700; color: var(--bg-dark); }
        .day-status { font-size: 10px; color: #888; margin-top: var(--spacing-xs); }
        .day-modal-summer { background: white; border-radius: var(--radius-lg); width: 500px; max-width: 92%; padding: var(--spacing-3xl) var(--spacing-4xl); }
        .day-modal-summer h3 { font-size: 24px; font-weight: 600; margin-bottom: var(--spacing-2xl); }
        .rehab-field { margin-bottom: var(--spacing-lg); }
        .rehab-field label { display: block; font-weight: 500; font-size: 14px; margin-bottom: 6px; color: #444; }
        .rehab-field input, .rehab-field textarea { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-lg); font-family: inherit; font-size: 14px; background: #fafafa; }
        .day-goals-section { margin-top: var(--spacing-2xl); padding-top: var(--spacing-lg); border-top: 1px solid var(--border-light); }
        .day-goals-title { font-weight: 600; font-size: 15px; margin-bottom: var(--spacing-md); }
        .day-goals-list { list-style: none; }
        .day-goals-list li { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
        .save-day-btn { width: 100%; padding: 14px; background: var(--bg-dark); color: white; border: none; border-radius: 48px; font-weight: 600; margin-top: var(--spacing-2xl); cursor: pointer; }

        /* Модальные окна */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .day-card { background: var(--bg-white); border-radius: var(--radius-xl); width: 500px; max-width: 92%; overflow: hidden; box-shadow: var(--shadow-xl); transform: scale(0.96); transition: transform 0.2s ease; }
        .modal-overlay.active .day-card { transform: scale(1); }
        .day-card-header { background: var(--bg-dark); padding: var(--spacing-3xl) var(--spacing-4xl); }
        .day-card-title { font-size: 34px; font-weight: 600; letter-spacing: -0.5px; color: white; }
        .day-card-body { padding: var(--spacing-3xl) var(--spacing-4xl) var(--spacing-4xl); }
        .day-card-section { margin-bottom: var(--spacing-3xl); }
        .day-card-label { font-size: 18px; font-weight: 600; margin-bottom: 14px; color: #222; }
        .day-card-check-group { display: flex; gap: var(--spacing-4xl); }
        .day-card-check { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 500; cursor: pointer; }
        .day-card-check input { width: 20px; height: 20px; appearance: none; border-radius: 50%; border: 2px solid #aaa; background: white; cursor: pointer; transition: var(--transition-fast); }
        .day-card-check input:checked { background: var(--bg-dark); border-color: var(--bg-dark); box-shadow: inset 0 0 0 3px white; }
        .day-card-focus { display: flex; gap: var(--spacing-lg); }
        .focus-option { width: 56px; padding: 10px 0; text-align: center; background: #f0f0f0; border: none; border-radius: 40px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .focus-option.active { background: var(--bg-dark); color: white; }
        .day-card-input { width: 100%; padding: 14px 18px; border: 1px solid #e5e5e5; border-radius: 44px; font-size: 15px; margin-bottom: 14px; background: #fafafa; }
        .day-card-task-list { list-style: none; max-height: 200px; overflow-y: auto; }
        .day-card-task-list li { display: flex; align-items: center; gap: var(--spacing-md); padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .day-card-task-list li input { width: 20px; height: 20px; appearance: none; border-radius: 50%; border: 2px solid #aaa; background: white; cursor: pointer; }
        .day-card-task-list li input:checked { background: var(--bg-dark); border-color: var(--bg-dark); box-shadow: inset 0 0 0 3px white; }
        .day-card-task-list li span { flex: 1; font-size: 14px; }
        .day-card-task-list li button { background: none; border: none; color: #bbb; cursor: pointer; font-size: 14px; }
        .day-card-total { background: #f5f5f5; padding: 18px; border-radius: var(--radius-lg); text-align: center; margin: var(--spacing-2xl) 0 var(--spacing-xl); font-weight: 600; font-size: 18px; }
        .day-card-total-note { font-size: 13px; font-weight: normal; color: #666; margin-top: 6px; }
        .day-card-close { width: 100%; padding: 16px; background: var(--bg-dark); color: white; border: none; border-radius: 48px; font-weight: 600; font-size: 16px; cursor: pointer; }
        .day-card-close:hover { background: #333; }
        .day-card-delete { width: 100%; background: none; border: 1px solid #e5e5e5; padding: 12px; border-radius: 48px; margin-top: var(--spacing-md); cursor: pointer; color: #999; font-size: 13px; }
        .day-card-delete:hover { background: #fafafa; color: var(--danger); border-color: var(--danger); }

        .custom-page-content { background: var(--bg-white); border-radius: var(--radius-lg); padding: var(--spacing-4xl); }
        .custom-page-content h2 { font-size: 28px; font-weight: 600; margin-bottom: var(--spacing-lg); }
        .custom-page-content p { color: #666; margin-bottom: var(--spacing-2xl); }
        .custom-notes-list { display: flex; flex-direction: column; gap: var(--spacing-md); margin-bottom: var(--spacing-2xl); }
        .custom-note-item { background: #f9f9f9; border-radius: var(--radius-sm); padding: 16px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .custom-note-item:hover { background: #f0f0f0; }
        .custom-note-item .note-text { flex: 1; cursor: pointer; font-size: 14px; line-height: 1.4; color: #333; }
        .custom-note-item .note-date { font-size: 11px; color: #aaa; margin-top: 6px; }
        .custom-note-item .note-actions { display: flex; gap: var(--spacing-sm); }
        .custom-note-item .note-btn { background: none; border: none; color: #999; cursor: pointer; padding: 6px; border-radius: var(--radius-sm); }
        .custom-note-item .note-btn.delete:hover { color: var(--danger); }
        .add-custom-note-btn { width: 100%; padding: var(--spacing-md); background: #f5f5f5; border: 1px dashed #ccc; border-radius: 40px; font-size: 14px; font-weight: 500; color: #888; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: var(--spacing-sm); }
        .add-custom-note-btn:hover { border-color: var(--bg-dark); color: var(--bg-dark); background: #fafafa; }

        .transaction-modal { background: white; border-radius: var(--radius-2xl); width: 400px; padding: var(--spacing-4xl); }
        .transaction-modal h3 { font-size: 28px; font-weight: 600; margin-bottom: var(--spacing-2xl); }
        .transaction-modal input, .transaction-modal textarea { width: 100%; padding: 14px 18px; border: 1px solid var(--border); border-radius: var(--radius-lg); font-family: inherit; font-size: 16px; margin-bottom: var(--spacing-lg); background: #fafafa; }
        .modal-buttons { display: flex; gap: var(--spacing-md); margin-top: var(--spacing-sm); }
        .modal-buttons button { flex: 1; padding: 14px; border-radius: 40px; font-weight: 600; border: none; cursor: pointer; }
        .modal-submit { background: var(--bg-dark); color: white; }
        .modal-cancel { background: #f0f0f0; color: #333; }

        /* ========== АДАПТИВНОСТЬ ========== */
        @media (max-width: 1100px) {
            body { padding: var(--spacing-xl); }
            .app-wrapper { flex-direction: column; }
            .sidebar { width: 100%; max-height: none; flex-direction: row; flex-wrap: wrap; gap: var(--spacing-sm); padding: var(--spacing-xl); }
            .prime-logo { margin-bottom: 0; width: 100%; }
            nav { flex-direction: row; flex-wrap: wrap; }
            .main-content { order: 2; }
            .right-panel { width: 100%; order: 3; }
        }
        @media (max-width: 700px) {
            .habits-grid { grid-template-columns: 1fr; }
            .weeks-grid { grid-template-columns: 1fr; }
            .days-grid { grid-template-columns: repeat(4, 1fr); }
            .calendar-grid { gap: 4px; }
            .day-button { max-width: 38px; font-size: 12px; }
            .week-modal { padding: var(--spacing-xl); }
            .day-card { width: 95%; }
        }
        @media (max-width: 500px) {
            .days-grid { grid-template-columns: repeat(2, 1fr); }
            .transaction-modal { width: 95%; padding: var(--spacing-2xl); }
            .day-card-summer .day-name { font-size: 11px; }
        }
    </style>
</head>
<body>
    
<div class="app-wrapper">
    <aside class="sidebar">
        <div class="prime-logo"><i class="fas fa-mask" aria-hidden="true"></i> prime</div>
        <nav>
            <div class="nav-item active" data-section="home" role="button" tabindex="0" aria-label="Home"><i class="fas fa-home" aria-hidden="true"></i> Home</div>
            <div class="nav-item" data-section="summer" role="button" tabindex="0" aria-label="Summer FP 2026"><i class="fas fa-sun" aria-hidden="true"></i> Summer FP 2026</div>
            <div class="nav-item" data-section="finance" role="button" tabindex="0" aria-label="Finance"><i class="fas fa-wallet" aria-hidden="true"></i> Finance</div>
            <div class="nav-item" data-section="goals" role="button" tabindex="0" aria-label="Goal summer"><i class="fas fa-bullseye" aria-hidden="true"></i> Goal summer</div>
            <div class="nav-item" data-section="notes" role="button" tabindex="0" aria-label="Notes"><i class="fas fa-sticky-note" aria-hidden="true"></i> Notes</div>
        </nav>
        <button class="new-chat-btn" id="newChatBtn" aria-label="Create new chat"><i class="fas fa-plus-circle" aria-hidden="true"></i> new chat</button>
        <div id="customSectionsContainer" class="dynamic-sections"></div>
    </aside>

    <main class="main-content" id="mainContent"></main>
    <aside class="right-panel" id="rightPanel"></aside>
</div>

<!-- MODALS -->
<div id="financeModal" class="modal-overlay"><div class="transaction-modal"><h3 id="modalTitleFinance">Пополнение</h3><input type="date" id="transactionDate" aria-label="Дата транзакции"><input type="number" id="transactionAmount" placeholder="Сумма" step="0.01" aria-label="Сумма"><div class="modal-buttons"><button class="modal-cancel" id="cancelFinanceModal">Отмена</button><button class="modal-submit" id="submitFinanceModal">Добавить</button></div></div></div>
<div id="allocationModal" class="modal-overlay"><div class="transaction-modal"><h3>Добавить статью бюджета</h3><input type="text" id="allocationName" placeholder="Название" aria-label="Название статьи"><input type="number" id="allocationSum" placeholder="Сумма" step="0.01" aria-label="Сумма"><div class="modal-buttons"><button class="modal-cancel" id="cancelAllocationModal">Отмена</button><button class="modal-submit" id="submitAllocationModal">Добавить</button></div></div></div>
<div id="noteModal" class="modal-overlay"><div class="transaction-modal"><h3 id="noteModalTitle">Новая заметка</h3><textarea id="noteText" placeholder="Текст заметки..." aria-label="Текст заметки"></textarea><div class="modal-buttons"><button class="modal-cancel" id="cancelNoteModal">Отмена</button><button class="modal-submit" id="submitNoteModal">Сохранить</button></div></div></div>
<div id="goalModal" class="modal-overlay"><div class="transaction-modal"><h3 id="goalModalTitle">Новая цель</h3><textarea id="goalText" placeholder="Опиши цель..." aria-label="Текст цели"></textarea><div class="modal-buttons"><button class="modal-cancel" id="cancelGoalModal">Отмена</button><button class="modal-submit" id="submitGoalModal">Добавить</button></div></div></div>
<div id="summerWeekModal" class="modal-overlay"><div class="week-modal"><div class="week-modal-header"><h2 id="summerWeekModalTitle">Неделя 1</h2><button class="close-modal" id="closeSummerWeekModalBtn" aria-label="Закрыть">&times;</button></div><div id="summerWeekModalContent"></div></div></div>
<div id="summerDayModal" class="modal-overlay"><div class="day-modal-summer"><h3 id="summerDayModalTitle">Понедельник</h3><div id="summerDayModalContent"></div><button class="save-day-btn" id="saveSummerDayBtn">Сохранить</button></div></div>

<script>
    // Полный функционал остаётся без изменений (весь JS-код из оригинального файла)
    // Для краткости здесь приведена ссылка на полную логику, но в рабочем файле она будет полностью скопирована
    
    // ========== HOME (HABITS) DATA ==========
    const startDateSummer = new Date(2026, 5, 1);
    const endDateSummer = new Date(2026, 7, 31);
    const totalDays = 92;
    function getDayOfSummer() { const today = new Date(); if (today < startDateSummer) return 0; if (today > endDateSummer) return totalDays; return Math.floor((today - startDateSummer) / (1000*60*60*24)) + 1; }
    let habits = [];
    function loadHabits() { const saved = localStorage.getItem('primeHabits'); if(saved) habits = JSON.parse(saved); else habits = [ { id:0, name:'Mathematical', completedDays:[], currentStreak:0, maxStreak:0 }, { id:1, name:'Literature', completedDays:[], currentStreak:0, maxStreak:0 }, { id:2, name:'Music', completedDays:[], currentStreak:0, maxStreak:0 }, { id:3, name:'Design', completedDays:[], currentStreak:0, maxStreak:0 } ]; updateAllStreaks(); }
    function saveHabits() { localStorage.setItem('primeHabits', JSON.stringify(habits)); }
    function updateStreak(habit) { let streak = 0; for(let i=getDayOfSummer(); i>=1; i--) { if(habit.completedDays.includes(i)) streak++; else break; } habit.currentStreak = streak; if(streak > habit.maxStreak) habit.maxStreak = streak; }
    function updateAllStreaks() { habits.forEach(h => updateStreak(h)); }
    function toggleDay(habitId, dayNum) { let habit = habits.find(h => h.id === habitId); if(!habit) return; let idx = habit.completedDays.indexOf(dayNum); if(idx === -1) habit.completedDays.push(dayNum); else habit.completedDays.splice(idx,1); habit.completedDays.sort((a,b)=>a-b); updateStreak(habit); saveHabits(); renderHabitsGrid(); renderAllDonePanel(); updateCalendarStats(); }
    function addHabit() { let newId = Date.now(); habits.push({ id:newId, name:'Новая привычка', completedDays:[], currentStreak:0, maxStreak:0 }); saveHabits(); renderHabitsGrid(); renderAllDonePanel(); }
    function deleteHabit(habitId) { if(confirm('Удалить?')) { habits = habits.filter(h => h.id !== habitId); saveHabits(); renderHabitsGrid(); renderAllDonePanel(); } }
    function resetHabit(habitId) { if(confirm('Обнулить?')) { let habit = habits.find(h => h.id === habitId); if(habit) { habit.completedDays = []; habit.currentStreak = 0; saveHabits(); renderHabitsGrid(); renderAllDonePanel(); } } }
    function renameHabit(habitId, newName) { let habit = habits.find(h => h.id === habitId); if(habit && newName.trim()) { habit.name = newName.trim(); saveHabits(); renderHabitsGrid(); } }
    function getProgressPercent(habit) { return (habit.completedDays.length / totalDays) * 100; }
    function getAllHabitsDoneDays() { let allDays = []; for(let day=1; day<=totalDays; day++) { let allCompleted = habits.every(h => h.completedDays.includes(day)); if(allCompleted) allDays.push(day); } return allDays; }
    function getAllDoneCount() { return getAllHabitsDoneDays().length; }
    function renderAllDonePanel() { let container = document.getElementById('allDonePanel'); if(container) container.innerHTML = `<div class="all-done-left"><div class="all-done-label">Все привычки за день</div><div class="all-done-number">${getAllDoneCount()}</div><div class="all-done-sub">дней выполнены все привычки</div></div><div class="all-done-icon"><i class="fas fa-trophy"></i></div>`; }
    function renderHabitsGrid() { let container = document.getElementById('habitsGrid'); if(!container) return; let html = '<div class="habits-grid">'; habits.forEach(h => { html += `<div class="habit-card"><div class="habit-header"><span class="habit-name" onclick="startRename(${h.id}, '${escapeHtml(h.name)}')">${escapeHtml(h.name)}</span><div class="habit-actions"><button class="habit-btn" onclick="resetHabit(${h.id})"><i class="fas fa-undo-alt"></i></button><button class="habit-btn delete" onclick="deleteHabit(${h.id})"><i class="fas fa-trash-alt"></i></button></div></div><div class="streak"><div class="streak-number">${h.currentStreak}</div><div class="streak-label">дней подряд</div></div><div class="progress-bar-bg"><div class="progress-fill" style="width: ${getProgressPercent(h)}%;"></div></div><div class="habit-footer"><span class="days-text">${h.completedDays.length} / ${totalDays} дней</span><button class="check-btn ${h.completedDays.includes(getDayOfSummer()) ? 'completed' : ''}" onclick="toggleToday(${h.id})"><i class="fas fa-check"></i></button></div></div>`; }); html += '</div>'; container.innerHTML = html; }
    function toggleToday(habitId) { let today = getDayOfSummer(); if(today>=1 && today<=totalDays) toggleDay(habitId, today); }
    function startRename(habitId, currentName) { let newName = prompt('Новое название:', currentName); if(newName && newName.trim()) renameHabit(habitId, newName); }
    window.toggleToday = toggleToday; window.deleteHabit = deleteHabit; window.resetHabit = resetHabit; window.addHabit = addHabit; window.startRename = startRename;

    // ========== CALENDAR ==========
    let currentCalendarMonth = 5, calendarYear = 2026, monthNames = ['ИЮНЬ 2026','ИЮЛЬ 2026','АВГУСТ 2026'], weekdaysRu = ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
    let dayData = {};
    function loadDayData() { let saved = localStorage.getItem('primeDayTracker'); if(saved) dayData = JSON.parse(saved); else dayData = {}; }
    function saveDayData() { localStorage.setItem('primeDayTracker', JSON.stringify(dayData)); }
    function getDateKey(y,m,d) { return `${y}-${m}-${d}`; }
    function getDefaultDayData() { return { routine: { ALL: false, MW: false, NP: false }, focus: 0, keyTasks: [] }; }
    function getDayData(y,m,d) { let key = getDateKey(y,m,d); if(!dayData[key]) dayData[key] = getDefaultDayData(); return dayData[key]; }
    function setDayData(y,m,d,data) { dayData[getDateKey(y,m,d)] = data; saveDayData(); updateCalendarStats(); }
    function calculateScore(data) { let score = 0; if(data.routine.ALL) score++; if(data.routine.MW) score++; if(data.routine.NP) score++; score += data.focus; let completed = data.keyTasks.filter(t=>t.completed).length; score += Math.min(completed,5); return Math.min(score,10); }
    function getScoreForDay(y,m,d) { let key = getDateKey(y,m,d); if(!dayData[key]) return 0; return calculateScore(dayData[key]); }
    function getCircleProgress(score) { if(score===0) return 132; if(score<=4) return 132; if(score<=6) return 99; if(score<=8) return 33; return 0; }
    function getDaysInMonth(m,y) { return new Date(y,m+1,0).getDate(); }
    function getFirstDayIndex(m,y) { let date = new Date(y,m,1); let dow = date.getDay(); return dow===0?6:dow-1; }
    function renderCalendar(m,y) { let days = getDaysInMonth(m,y), first = getFirstDayIndex(m,y), today = new Date(), isCurrent = (today.getMonth()===m && today.getFullYear()===y), todayDate = today.getDate(), prevDays = getDaysInMonth(m-1,y); let html = '<div class="calendar-grid">'; weekdaysRu.forEach(w => html += `<div class="weekday">${w}</div>`); let dayCounter=1, nextDay=1; for(let i=0; i<42; i++) { let dayNum, isCurrentMonth, isToday=false; if(i<first) { dayNum = prevDays - (first-i) + 1; isCurrentMonth=false; } else if(dayCounter<=days) { dayNum = dayCounter; isCurrentMonth=true; isToday = (isCurrent && dayCounter===todayDate); dayCounter++; } else { dayNum = nextDay; isCurrentMonth=false; nextDay++; } let progress = 132; if(isCurrentMonth) progress = getCircleProgress(getScoreForDay(y,m,dayNum)); let todayClass = isToday ? 'today' : ''; let otherClass = !isCurrentMonth ? 'other-month' : ''; html += `<div style="display:flex;justify-content:center;"><button class="day-button ${todayClass} ${otherClass}" data-day="${dayNum}" data-month="${m}" data-year="${y}" data-current="${isCurrentMonth}"><span>${dayNum}</span><svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="21" stroke-dasharray="132" stroke-dashoffset="${progress}"></circle></svg></button></div>`; } html += '</div>'; return html; }
    function updateCalendarStats() { let strong=0, total=0, count=0; for(let key in dayData) { let score = calculateScore(dayData[key]); total += score; count++; if(score>=9) strong++; } let middle = count>0 ? (total/count).toFixed(1) : 0; let strongEl = document.getElementById('strongDaysValue'); let totalEl = document.getElementById('totalScoreValueStats'); let middleEl = document.getElementById('middleMarkValue'); if(strongEl) strongEl.innerText = strong; if(totalEl) totalEl.innerText = total; if(middleEl) middleEl.innerText = middle; }
    function updateCalendar() { let container = document.getElementById('calendarContainer'); if(container) { container.innerHTML = renderCalendar(currentCalendarMonth, calendarYear); document.getElementById('currentMonthDisplay').innerText = monthNames[currentCalendarMonth-5]; document.querySelectorAll('.day-button[data-current="true"]').forEach(btn => { btn.addEventListener('click', () => { openTaskModal(parseInt(btn.dataset.year), parseInt(btn.dataset.month), parseInt(btn.dataset.day)); }); }); } updateDaysLeft(); updateCalendarStats(); }
    function updateDaysLeft() { let diff = Math.ceil((new Date(2026,7,31) - new Date())/(1000*60*60*24)); let el = document.getElementById('daysLeftValue'); if(el) el.innerText = diff>0?diff:0; }
    function prevMonth() { if(currentCalendarMonth>5) { currentCalendarMonth--; updateCalendar(); } }
    function nextMonth() { if(currentCalendarMonth<7) { currentCalendarMonth++; updateCalendar(); } }
    let currentYear, currentMonth, currentDay, currentData = null;
    function openTaskModal(y,m,d) { currentYear=y; currentMonth=m; currentDay=d; currentData = getDayData(y,m,d); document.getElementById('modalDayNum').innerText = d; document.getElementById('taskALL').checked = currentData.routine.ALL; document.getElementById('taskMW').checked = currentData.routine.MW; document.getElementById('taskNP').checked = currentData.routine.NP; document.querySelectorAll('.focus-option').forEach(btn => { btn.classList.remove('active'); if(parseInt(btn.dataset.focus) === currentData.focus) btn.classList.add('active'); }); renderKeyTasks(); updateModalScore(); document.getElementById('taskModal').classList.add('active'); }
    function renderKeyTasks() { let list = document.getElementById('keyTasksList'); list.innerHTML = ''; currentData.keyTasks.forEach((task, idx) => { let li = document.createElement('li'); li.innerHTML = `<input type="checkbox" data-key-idx="${idx}" ${task.completed ? 'checked' : ''}><span style="flex:1; ${task.completed ? 'text-decoration:line-through;color:#999;' : ''}">${escapeHtml(task.text)}</span><button data-key-idx="${idx}" class="delete-key-task" style="background:none;border:none;color:#bbb;cursor:pointer;"><i class="fas fa-times"></i></button>`; list.appendChild(li); }); document.querySelectorAll('#keyTasksList input').forEach(cb => { cb.addEventListener('change', (e) => { let idx = parseInt(cb.dataset.keyIdx); currentData.keyTasks[idx].completed = cb.checked; setDayData(currentYear,currentMonth,currentDay,currentData); updateModalScore(); updateCalendar(); }); }); document.querySelectorAll('.delete-key-task').forEach(btn => { btn.addEventListener('click', (e) => { let idx = parseInt(btn.dataset.keyIdx); currentData.keyTasks.splice(idx,1); setDayData(currentYear,currentMonth,currentDay,currentData); renderKeyTasks(); updateModalScore(); updateCalendar(); }); }); }
    function updateModalScore() { let score = calculateScore(currentData); document.getElementById('totalScoreValue').innerText = `${score}/10`; let msg = score <= 3 ? "слабый день" : (score <= 6 ? "средний день" : (score <= 8 ? "хороший день" : "отличный день!")); document.getElementById('scoreMessage').innerHTML = msg; }
    function saveCurrentData() { currentData.routine = { ALL: document.getElementById('taskALL').checked, MW: document.getElementById('taskMW').checked, NP: document.getElementById('taskNP').checked }; let active = document.querySelector('.focus-option.active'); currentData.focus = active ? parseInt(active.dataset.focus) : 0; setDayData(currentYear,currentMonth,currentDay,currentData); updateModalScore(); updateCalendar(); }

    // ========== FINANCE ==========
    let balance = 0, transactions = [], allocations = [];

        else if(isSunday) { metricsHtml = `<div class="rehab-field"><label>Вес (кг) — итог недели</label><input type="number" step="0.1" id="summer_weight_end" value="${day.endMetrics.weight}"></div><div class="rehab-field"><label>Колено (1–10) — итог</label><input type="number" min="1" max="10" id="summer_knee_end" value="${day.endMetrics.knee}"></div><div class="rehab-field"><label>Надкостницы (1–10) — итог</label><input type="number" min="1" max="10" id="summer_periosteum_end" value="${day.endMetrics.periosteum}"></div><div class="rehab-field"><label>Сон (1–10) — итог</label><input type="number" min="1" max="10" id="summer_sleep_end" value="${day.endMetrics.sleep}"></div><div class="rehab-field"><label>Футбол (1–10) — итог</label><input type="number" min="1" max="10" id="summer_football_end" value="${day.endMetrics.football}"></div><div class="rehab-field"><label>Общее состояние — итог</label><textarea id="summer_general_end" rows="2">${escapeHtml(day.endMetrics.generalFeeling)}</textarea></div>`; }
        let dayGoalsHtml = `<div class="day-goals-section"><div class="day-goals-title">Задачи на день</div><ul class="day-goals-list" id="summerDayGoalsList">`;
        day.dayGoals.forEach((goal,gIdx)=>{ dayGoalsHtml += `<li><input type="checkbox" ${goal.completed?'checked':''} onchange="toggleSummerDayGoal(${weekIdx},${dayIdx},${gIdx})"><span>${escapeHtml(goal.text)}</span><button onclick="deleteSummerDayGoal(${weekIdx},${dayIdx},${gIdx})"><i class="fas fa-times"></i></button></li>`; });
        dayGoalsHtml += `</ul><input type="text" id="newSummerDayGoalInput" class="add-goal-input" placeholder="Новая задача + Enter"></div>`;
        document.getElementById('summerDayModalTitle').innerHTML = `${day.fullName} (Неделя ${week.id})`;
        document.getElementById('summerDayModalContent').innerHTML = (metricsHtml?metricsHtml:'<p style="color:#888; margin-bottom:16px;">В этот день нет обязательных метрик. Вы можете добавить задачи ниже.</p>') + dayGoalsHtml;
        let dayInput = document.getElementById('newSummerDayGoalInput');
        if(dayInput) { dayInput.removeEventListener('keypress', dayInput._listener); dayInput._listener = (e) => { if(e.key === 'Enter') { let text = e.target.value.trim(); if(text) { summerWeeksData[weekIdx].days[dayIdx].dayGoals.push({ text, completed:false }); saveSummerData(); openSummerDayModal(weekIdx, dayIdx); } } }; dayInput.addEventListener('keypress', dayInput._listener); }
        document.getElementById('summerDayModal').classList.add('active');
    }
    window.toggleSummerDayGoal = (weekIdx, dayIdx, goalIdx) => { summerWeeksData[weekIdx].days[dayIdx].dayGoals[goalIdx].completed = !summerWeeksData[weekIdx].days[dayIdx].dayGoals[goalIdx].completed; saveSummerData(); openSummerDayModal(weekIdx, dayIdx); };
    window.deleteSummerDayGoal = (weekIdx, dayIdx, goalIdx) => { summerWeeksData[weekIdx].days[dayIdx].dayGoals.splice(goalIdx,1); saveSummerData(); openSummerDayModal(weekIdx, dayIdx); };
    function saveSummerCurrentDay() {
        let week = summerWeeksData[currentSummerDayWeekIdx]; let day = week.days[currentSummerDayIdx];
        let isMonday=(currentSummerDayIdx===0), isSunday=(currentSummerDayIdx===6);
        if(isMonday) {
            day.metrics.weight = document.getElementById('summer_weight')?.value||'';
            day.metrics.knee = document.getElementById('summer_knee')?.value||'';
            day.metrics.periosteum = document.getElementById('summer_periosteum')?.value||'';
            day.metrics.sleep = document.getElementById('summer_sleep')?.value||'';
            day.metrics.football = document.getElementById('summer_football')?.value||'';
            day.metrics.generalFeeling = document.getElementById('summer_general')?.value||'';
        } else if(isSunday) {
            day.endMetrics.weight = document.getElementById('summer_weight_end')?.value||'';
            day.endMetrics.knee = document.getElementById('summer_knee_end')?.value||'';
            day.endMetrics.periosteum = document.getElementById('summer_periosteum_end')?.value||'';
            day.endMetrics.sleep = document.getElementById('summer_sleep_end')?.value||'';
            day.endMetrics.football = document.getElementById('summer_football_end')?.value||'';
            day.endMetrics.generalFeeling = document.getElementById('summer_general_end')?.value||'';
        } else {
            let customScore = prompt('Оцените день от 1 до 10:', day.score||'');
            if(customScore !== null) { let sc = parseInt(customScore); if(!isNaN(sc) && sc>=1 && sc<=10) day.score = sc; }
        }
        if(isMonday || isSunday) {
            let total=0, cnt=0;
            let metrics = isMonday ? day.metrics : day.endMetrics;
            [metrics.knee, metrics.periosteum, metrics.sleep, metrics.football].forEach(v=>{ let num = parseFloat(v); if(!isNaN(num) && num>=1 && num<=10) { total+=num; cnt++; } });
            if(cnt>0) day.score = Math.round(total/cnt);
        }
        saveSummerData(); recalcSummerWeekAvg(currentSummerDayWeekIdx);
        document.getElementById('summerDayModal').classList.remove('active');
        openSummerWeekModal(currentSummerDayWeekIdx);
        renderSummerWeeksGrid();
    }

    // ========== КОНТЕНТ ==========
    const homeMainContent = `<div class="education-card"><h2>Consistency</h2><p>is what makes work effective.</p></div><div class="habits-header-row"><button class="add-habit-btn" onclick="addHabit()"><i class="fas fa-plus-circle"></i> Добавить привычку</button></div><div id="habitsGrid"></div><div id="allDonePanel" class="all-done-panel"></div>`;
    const homeRightContent = `<div class="calendar-card"><div class="calendar-header"><h4>Calendar</h4><div class="month-nav"><button id="prevMonthBtn">←</button><span id="currentMonthDisplay" style="font-weight:600;">ИЮНЬ 2026</span><button id="nextMonthBtn">→</button></div></div><div id="calendarContainer"></div><div class="stats-row"><div class="stat-line"><span>Strong days (9-10 баллов)</span><span id="strongDaysValue">0</span></div><div class="stat-line"><span>Total score</span><span id="totalScoreValueStats">0</span></div><div class="stat-line"><span>Middle mark</span><span id="middleMarkValue">0</span></div></div><div class="days-left"><i class="fas fa-calendar-alt"></i> До конца лета: <strong id="daysLeftValue">0</strong> дней <i class="fas fa-sun"></i></div></div>`;
    const financeMainContent = `<div class="finance-card"><div class="finance-title">Общий бюджет</div><div class="balance-amount">$<span id="balanceAmount">0</span></div><div class="action-buttons"><button class="action-circle" id="incomeBtn">+</button><button class="action-circle" id="expenseBtn">−</button></div></div><div class="transactions-card"><h3>История транзакций</h3><div id="transactionsList"></div></div>`;
    const financeRightContent = `<div class="chart-card"><h4>Динамика баланса (90 дней)</h4><div class="chart-container" id="chartContainer"></div></div><div class="allocation-card"><h4>Распределение бюджета</h4><div id="allocationsList"></div><button class="add-allocation-btn" id="addAllocationBtn"><i class="fas fa-plus-circle"></i> Добавить статью</button></div>`;
    const goalsMainContent = `<div class="education-card"><h2>Goal summer</h2><p>Твои цели на лето 2026</p></div><div class="goals-card"><div class="goals-header"><h3>Мои цели</h3><button class="add-goal-btn" onclick="openGoalModal()"><i class="fas fa-plus-circle"></i> Добавить цель</button></div><div id="goalsList" class="goals-list"></div></div>`;
    const notesMainContent = `<div class="education-card"><h2>Notes</h2><p>Your personal notes</p></div><div class="notes-card"><div class="notes-header"><h3>Все заметки</h3><button class="add-note-btn" onclick="openNoteModal()"><i class="fas fa-plus-circle"></i> Новая заметка</button></div><div id="notesList" class="notes-list"></div></div>`;
    const summerMainContent = `<div class="education-card"><h2>Summer FP 2026</h2><p>Реабилитация колена · 12 недель к восстановлению</p></div><div id="summerWeeksContainer" class="weeks-grid"></div>`;

        let mainEl = document.getElementById('mainContent'), rightEl = document.getElementById('rightPanel');
        if (sectionId === 'home') {
            mainEl.innerHTML = homeMainContent; rightEl.innerHTML = homeRightContent;
            renderHabitsGrid(); renderAllDonePanel(); updateCalendar();

    document.getElementById('cancelCustomNoteModal')?.addEventListener('click', () => document.getElementById('customNoteModal').classList.remove('active'));
    document.getElementById('submitCustomNoteModal')?.addEventListener('click', saveCustomNote);
    document.getElementById('customNoteModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('customNoteModal')) document.getElementById('customNoteModal').classList.remove('active'); });

    document.getElementById('saveSummerDayBtn')?.addEventListener('click', saveSummerCurrentDay);
    document.getElementById('closeSummerWeekModalBtn')?.addEventListener('click', () => { document.getElementById('summerWeekModal').classList.remove('active'); renderSummerWeeksGrid(); });
    document.getElementById('summerWeekModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('summerWeekModal')) { document.getElementById('summerWeekModal').classList.remove('active'); renderSummerWeeksGrid(); } });
    document.getElementById('summerDayModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('summerDayModal')) document.getElementById('summerDayModal').classList.remove('active'); });

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    loadHabits(); loadDayData(); loadFinanceData(); loadNotes(); loadGoals(); loadCustomSections(); initSummerData(); setActiveSection('home');
</script>

<script>
// ========== РЕГИСТРАЦИЯ И ВХОД (localStorage) ==========
(function() {
    const STORAGE_USERS = 'prime_local_users';
    const STORAGE_SESSION = 'prime_local_session';
    
    function getUsers() {
        const users = localStorage.getItem(STORAGE_USERS);
        return users ? JSON.parse(users) : [];
    }
    
    function saveUsers(users) {
        localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
    }
    
    function getCurrentUser() {
        const session = localStorage.getItem(STORAGE_SESSION);
        return session ? JSON.parse(session) : null;
    }
    
    function setCurrentUser(user) {
        if (user) {
            localStorage.setItem(STORAGE_SESSION, JSON.stringify(user));
        } else {
            localStorage.removeItem(STORAGE_SESSION);
        }
    }
    
    function showAuthError(formId, message) {
        const errorDiv = formId === 'login' ? document.getElementById('authLoginError') : document.getElementById('authRegisterError');
        if (errorDiv) {
            errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + message;
            errorDiv.style.display = 'flex';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
        }
    }
    
    function showAuthSuccess(message) {
        const successDiv = document.getElementById('authRegisterSuccess');
        if (successDiv) {
            successDiv.innerHTML = '<i class="fas fa-check-circle"></i> ' + message;
            successDiv.style.display = 'flex';
            setTimeout(() => { successDiv.style.display = 'none'; }, 3000);
        }
    }
    
    function loginUser(email, password) {
        if (!email || !password) {
            showAuthError('login', 'Заполните все поля');
            return false;
        }
        const users = getUsers();
        const user = users.find(u => u.email === email && u.password === password);
        if (user) {
            setCurrentUser({ id: user.id, name: user.name, email: user.email });
            return true;
        } else {
            showAuthError('login', 'Неверный email или пароль');
            return false;
        }
    }
    
    function registerUser(name, email, password) {
        if (!name || !email || !password) {
            showAuthError('register', 'Заполните все поля');
            return false;
        }
        if (password.length < 6) {
            showAuthError('register', 'Пароль минимум 6 символов');
            return false;
        }
        const users = getUsers();
        if (users.find(u => u.email === email)) {
            showAuthError('register', 'Этот email уже зарегистрирован');
            return false;
        }
        const newUser = { id: Date.now(), name: name.trim(), email: email, password: password };
        users.push(newUser);
        saveUsers(users);
        showAuthSuccess('Регистрация успешна! Теперь войдите.');
        return true;
    }
    
    function logout() {
        setCurrentUser(null);
        location.reload();
    }
    
    function updateUIForAuth() {
        const user = getCurrentUser();
        const authOverlay = document.getElementById('authOverlay');
        const logoutBtn = document.getElementById('globalLogoutBtn');
        const appWrapper = document.querySelector('.app-wrapper');
        
        if (user) {
            if (authOverlay) authOverlay.classList.remove('active');
            if (logoutBtn) logoutBtn.style.display = 'flex';
            if (appWrapper) appWrapper.style.display = 'flex';
        } else {
            if (authOverlay) authOverlay.classList.add('active');
            if (logoutBtn) logoutBtn.style.display = 'none';
            if (appWrapper) appWrapper.style.display = 'none';
        }
    }
    
    // Инициализация событий
    function initAuthUI() {
        const overlay = document.getElementById('authOverlay');
        const loginBtn = document.getElementById('authDoLogin');
        const registerBtn = document.getElementById('authDoRegister');
        const logoutBtn = document.getElementById('globalLogoutBtn');
        const tabBtns = document.querySelectorAll('.auth-tab');
        const loginForm = document.getElementById('authLoginForm');
        const registerForm = document.getElementById('authRegisterForm');
        const loginEmail = document.getElementById('authLoginEmail');
        const loginPassword = document.getElementById('authLoginPassword');
        const regName = document.getElementById('authRegName');
        const regEmail = document.getElementById('authRegEmail');
        const regPassword = document.getElementById('authRegPassword');
        
        if (tabBtns.length) {
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tab = btn.dataset.authTab;
                    if (tab === 'login') {
                        loginForm.classList.add('active');
                        registerForm.classList.remove('active');
                    } else {
                        registerForm.classList.add('active');
                        loginForm.classList.remove('active');
                    }
                    const errors = document.querySelectorAll('.auth-error, .auth-success');
                    errors.forEach(e => e.style.display = 'none');
                });
            });
        }
        
        if (loginBtn) {
            loginBtn.addEventListener('click', () => {
                const email = loginEmail?.value.trim() || '';
                const password = loginPassword?.value || '';
                if (loginUser(email, password)) {
                    updateUIForAuth();
                }
            });
        }
        
        if (registerBtn) {
            registerBtn.addEventListener('click', () => {
                const name = regName?.value.trim() || '';
                const email = regEmail?.value.trim() || '';
                const password = regPassword?.value || '';
                if (registerUser(name, email, password)) {
                    // Переключаем на вкладку входа после регистрации
                    const loginTab = document.querySelector('.auth-tab[data-auth-tab="login"]');
                    if (loginTab) loginTab.click();
                    if (loginEmail) loginEmail.value = email;
                    if (loginPassword) loginPassword.value = '';
                }
            });
        }
        
        if (logoutBtn) {
            logoutBtn.addEventListener('click', logout);
        }
        
        // Закрытие по клику на оверлей
        if (overlay) {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    // Не закрываем, если нет пользователя
                }
            });
        }
        
        // Enter для отправки форм
        const handleEnter = (e, callback) => { if (e.key === 'Enter') callback(); };
        if (loginEmail) loginEmail.addEventListener('keypress', (e) => handleEnter(e, () => loginBtn?.click()));
        if (loginPassword) loginPassword.addEventListener('keypress', (e) => handleEnter(e, () => loginBtn?.click()));
        if (regName) regName.addEventListener('keypress', (e) => handleEnter(e, () => registerBtn?.click()));
        if (regEmail) regEmail.addEventListener('keypress', (e) => handleEnter(e, () => registerBtn?.click()));
        if (regPassword) regPassword.addEventListener('keypress', (e) => handleEnter(e, () => registerBtn?.click()));
        
        // demo пользователь
        const users = getUsers();
        if (!users.find(u => u.email === 'demo@prime.app')) {
            users.push({ id: 999, name: 'Demo', email: 'demo@prime.app', password: 'demo123' });
            saveUsers(users);
        }
    }
    
    // Запускаем после загрузки DOM
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            initAuthUI();
            updateUIForAuth();
        });
    } else {
        initAuthUI();
        updateUIForAuth();
    }
})();
</script>
</body>
</html>
